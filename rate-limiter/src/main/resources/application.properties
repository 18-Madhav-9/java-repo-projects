# ============================================================
# Rate Limiter V3.1 Configuration
# ============================================================

# ---- Store Selection ----
# AUTO   → uses REDIS if spring.data.redis.* is configured, otherwise MEMORY
# MEMORY → always use in-process ConcurrentHashMap (default for local dev)
# REDIS  → always use Redis (requires spring.data.redis.* to be set)
rate-limit.store=MEMORY

# ---- Redis Failure Mode (used when store=REDIS) ----
# ALLOW_ALL          → fail-open: allow all requests when Redis is down
# DENY_ALL           → fail-closed: block all requests when Redis is down (HTTP 429)
# FALLBACK_TO_MEMORY → per-instance in-memory limiting continues (recommended)
rate-limit.redis-failure-mode=FALLBACK_TO_MEMORY

# ---- Algorithm Selection ----
# Options: FIXED_WINDOW | SLIDING_WINDOW | TOKEN_BUCKET
rate-limit.algorithm=SLIDING_WINDOW

# ---- Identity Resolution ----
# Options: IP | API_KEY | JWT
rate-limit.identity=IP

# ---- Global Defaults ----
rate-limit.default-max-requests=20
rate-limit.window-size-in-seconds=60

# ---- Cleanup Scheduler ----
# Interval in milliseconds (default: 300000 = 5 minutes)
# No-op when store=REDIS (Redis TTL handles cleanup)
rate-limit.cleanup-interval-ms=300000

# ---- Per-API Limits (method:path → max requests per window) ----
# Reads — generous limits
rate-limit.endpoint-limits.GET\:/api/user=100
rate-limit.endpoint-limits.GET\:/api/product=150
rate-limit.endpoint-limits.GET\:/api/test=5

# Writes — strict limits
rate-limit.endpoint-limits.POST\:/api/order=10
rate-limit.endpoint-limits.POST\:/api/user=15
rate-limit.endpoint-limits.PUT\:/api/user=15
rate-limit.endpoint-limits.DELETE\:/api/user=5

# ============================================================
# Redis Connection (inactive when store=MEMORY; used with store=REDIS or AUTO)
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
# Disable Spring Boot Redis health indicator when not using Redis store
spring.autoconfigure.exclude=

# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# OpenAPI / Swagger UI Configuration
# ============================================================
springdoc.packages-to-scan=com.ratelimiter.controller,com.ratelimiter.admin
springdoc.paths-to-match=/api/**,/admin/**

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.css-url=/css/swagger-dark.css

springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.default-models-expand-depth=-1
springdoc.swagger-ui.display-request-duration=true

# ============================================================
# Actuator / Metrics
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
