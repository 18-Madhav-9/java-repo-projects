# ============================================================
# Rate Limiter V3.1 — Redis Profile
# Activate with: SPRING_PROFILES_ACTIVE=redis
# ============================================================

# Force Redis store
rate-limit.store=REDIS

# Recommended failure mode (per-instance fallback when Redis is down)
rate-limit.redis-failure-mode=FALLBACK_TO_MEMORY

# Redis connection — host/port overridable via environment variables
# Used by Docker Compose: REDIS_HOST=redis, REDIS_PORT=6379
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Allow Redis health indicator to be visible in actuator
management.health.redis.enabled=true
management.endpoints.web.exposure.include=health,info,metrics
