server:
  port: 8080

spring:
  application:
    name: task-scheduler

  datasource:
    url: jdbc:h2:file:./data/scheduler-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# ── Scheduler Configuration ──────────────────────────────────────────
scheduler:
  polling-interval-ms: 60000   # 1 minute between scheduler ticks
  thread-pool-size: 4          # reserved for V2 parallel execution

logging:
  level:
    root: INFO
    com.taskscheduler: DEBUG
    org.hibernate.SQL: WARN
